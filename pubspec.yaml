name: card_tracker
description: Card performance tracker with notifications
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  # Charts
  fl_chart: ^0.68.0
  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  # Open Banking
  http: ^1.2.1
  flutter_web_auth_2: ^4.0.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
